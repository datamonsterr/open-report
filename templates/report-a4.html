<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="generator" content="open-report">
<title>{{TITLE}}</title>
<style>
  @page {
    size: A4;
    margin: 2.5cm 2cm 2.5cm 2cm;
    @top-left {
      content: "{{HEADER_CONTENT}}";
      font-size: 9pt;
      color: #666;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    @top-right {
      content: "{{TITLE}}";
      font-size: 9pt;
      color: #666;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    @bottom-left {
      content: "{{FOOTER_CONTENT}}";
      font-size: 9pt;
      color: #666;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    @bottom-right {
      content: {{PAGE_NUMBERS}};
      font-size: 9pt;
      color: #666;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    @bottom-center {
      content: "";
    }
  }

  :root {
    --primary: #1a56db;
    --primary-light: #e8f0fe;
    --text: #1f2937;
    --text-secondary: #6b7280;
    --border: #e5e7eb;
    --bg: #ffffff;
    --code-bg: #f3f4f6;
    --heading-color: #111827;
    --blockquote-border: #3b82f6;
    --table-stripe: #f9fafb;
    --table-border: #d1d5db;
    --link-color: #2563eb;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 11pt;
    line-height: 1.7;
    color: var(--text);
    background: var(--bg);
    max-width: 210mm;
    margin: 0 auto;
    padding: 2.5cm 2cm;
  }

  {{LOGO}}

  .report-header {
    border-bottom: 3px solid var(--primary);
    padding-bottom: 1.5rem;
    margin-bottom: 2rem;
    page-break-after: avoid;
  }

  .report-header h1 {
    font-size: 24pt;
    color: var(--heading-color);
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .report-meta {
    display: flex;
    gap: 2rem;
    margin-top: 0.75rem;
    font-size: 9pt;
    color: var(--text-secondary);
  }

  .report-meta span::before {
    content: attr(data-label);
    font-weight: 600;
    color: var(--text);
  }

  {{TABLE_OF_CONTENTS}}

  nav.toc {
    background: var(--primary-light);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 2rem;
    page-break-after: always;
  }

  nav.toc h2 {
    font-size: 14pt;
    margin-bottom: 0.75rem;
    color: var(--primary);
    border: none;
  }

  nav.toc ul {
    list-style: none;
    padding: 0;
  }

  nav.toc li {
    padding: 0.25rem 0;
  }

  nav.toc a {
    color: var(--link-color);
    text-decoration: none;
    font-size: 10pt;
  }

  nav.toc a:hover {
    text-decoration: underline;
  }

  nav.toc .toc-h2 { font-weight: 600; }
  nav.toc .toc-h3 { padding-left: 1.5rem; }

  h1 { font-size: 20pt; color: var(--heading-color); margin: 1.5rem 0 0.75rem; page-break-after: avoid; }
  h2 { font-size: 16pt; color: var(--heading-color); margin: 1.25rem 0 0.5rem; padding-bottom: 0.25rem; border-bottom: 1px solid var(--border); page-break-after: avoid; }
  h3 { font-size: 13pt; color: var(--heading-color); margin: 1rem 0 0.5rem; page-break-after: avoid; }
  h4 { font-size: 11pt; color: var(--heading-color); margin: 0.75rem 0 0.25rem; }

  p { margin-bottom: 0.75rem; }

  a { color: var(--link-color); }

  strong { color: var(--heading-color); }

  ul, ol { margin: 0.5rem 0 0.75rem 1.5rem; }
  li { margin-bottom: 0.25rem; }

  blockquote {
    border-left: 4px solid var(--blockquote-border);
    padding: 0.5rem 1rem;
    margin: 1rem 0;
    background: var(--primary-light);
    border-radius: 0 4px 4px 0;
    color: #374151;
  }

  code {
    background: var(--code-bg);
    padding: 0.15em 0.4em;
    border-radius: 3px;
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 9pt;
  }

  pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
    margin: 1rem 0;
    overflow-x: auto;
    font-size: 9pt;
    line-height: 1.5;
    page-break-inside: avoid;
  }

  pre code {
    background: none;
    padding: 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
    font-size: 10pt;
    page-break-inside: avoid;
  }

  th, td {
    border: 1px solid var(--table-border);
    padding: 0.5rem 0.75rem;
    text-align: left;
  }

  th {
    background: var(--code-bg);
    font-weight: 600;
    color: var(--heading-color);
  }

  tr:nth-child(even) {
    background: var(--table-stripe);
  }

  hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.5rem 0;
  }

  img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 1.25rem auto;
    page-break-inside: avoid;
  }

  figure {
    margin: 1.5rem 0;
    text-align: center;
    page-break-inside: avoid;
  }

  figcaption {
    font-size: 9pt;
    color: var(--text-secondary);
    margin-top: 0.5rem;
    font-style: italic;
  }

  .page-break {
    page-break-after: always;
  }

  @media print {
    body {
      padding: 0;
      max-width: none;
    }

    .page-break {
      page-break-after: always;
    }

    h2, h3, h4 { page-break-after: avoid; }
    img, table, figure, pre, blockquote { page-break-inside: avoid; }
  }

  @media screen {
    body {
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      margin: 2rem auto;
    }
  }

  {{CSS_EXTRA}}
</style>
</head>
<body>

<div class="report-header">
  <h1>{{TITLE}}</h1>
  <div class="report-meta">
    <span data-label="Author: ">{{AUTHOR}}</span>
    <span data-label="Date: ">{{DATE}}</span>
  </div>
</div>

{{TABLE_OF_CONTENTS}}

{{CONTENT}}

</body>
</html>
